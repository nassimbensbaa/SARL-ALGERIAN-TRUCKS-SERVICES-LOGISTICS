<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Gestion des Avances ATSL
</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<!-- FONT AWESOME ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#eaf4ff;
color:#333;
padding:20px;
}

header{
background:linear-gradient(135deg,#0066cc,#0099ff);
color:#fff;
padding:25px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.15);
margin-bottom:20px;
}

header h1{font-size:30px;font-weight:700;}
header h3{margin-top:8px;font-weight:400;}

.container{
display:flex;
gap:20px;
align-items:flex-start;
}

.left-panel{
width:320px;
background:#fff;
border-radius:12px;
padding:15px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
position:sticky;
top:20px;
}

.right-panel{
flex:1;
display:flex;
flex-direction:column;
gap:20px;
}

.card{
background:#fff;
border-radius:12px;
padding:20px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.card h2{
color:#0066cc;
margin-bottom:15px;
font-size:22px;
}

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
}

input,select{
width:100%;
padding:10px;
border:1px solid #d0d0d0;
border-radius:8px;
font-size:14px;
outline:none;
}

input:focus,select:focus{
border-color:#0099ff;
}

button{
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

/* BUTTONS */
.btn-primary{background:#007bff;color:white;}
.btn-primary:hover{background:#0062cc;}

.btn-success{background:#198754;color:white;}
.btn-success:hover{background:#157347;}

.btn-danger{background:#dc3545;color:white;}
.btn-danger:hover{background:#bb2d3b;}

.btn-warning{background:#fd7e14;color:white;}
.btn-warning:hover{background:#dc6502;}

.btn-print{background:#6c757d;color:white;}
.btn-print:hover{background:#565e64;}

/* ICON BUTTONS */
.icon-btn{
border:none;
padding:6px 9px;
border-radius:6px;
cursor:pointer;
font-size:14px;
margin:0 3px;
transition:.3s;
}

.icon-edit{
background:#fd7e14;
color:white;
}

.icon-edit:hover{
background:#dc6502;
}

.icon-delete{
background:#dc3545;
color:white;
}

.icon-delete:hover{
background:#bb2d3b;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#007bff;
color:white;
padding:10px;
font-size:14px;
}

td{
padding:10px;
border:1px solid #ddd;
font-size:14px;
}

tbody tr:nth-child(even){
background:#f8fbff;
}

.total-box{
margin-top:15px;
font-size:18px;
font-weight:700;
color:#198754;
}

.action-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:15px;
}

#print-area{display:none;}

@media(max-width:1000px){
.container{flex-direction:column;}
.left-panel{width:100%;position:relative;top:auto;}
}

@media print{
body{background:white;}
header,button{display:none;}
.card{box-shadow:none;border:none;}
#print-area{display:block;}
}

</style>

</head>

<body>

<header>
<h1>Sarl Algerian Trucks Services and Logistics</h1>
<h3>Directeur financier : BENSBAA Nassim</h3>
</header>

<div class="container">

<!-- LEFT -->
<div class="left-panel">
<div class="card">
<h2>Liste des employés</h2>

<table id="employees-table">
<thead>
<tr>
<th>N°</th>
<th>Nom</th>
<th>Poste</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>
</div>

<!-- RIGHT -->
<div class="right-panel">

<!-- EMPLOYEE -->
<div class="card">
<h2>Ajouter un employé</h2>

<form id="employee-form">
<div class="form-grid">
<input type="text" id="employeeNumber" placeholder="N°" required>
<input type="text" id="employeeName" placeholder="Nom et prénom" required>
<input type="text" id="employeePosition" placeholder="Poste" required>
</div>

<br>

<button type="submit" class="btn-primary">
Ajouter l'employé
</button>

</form>
</div>

<!-- ADVANCE -->
<div class="card">
<h2>Ajouter une avance</h2>

<form id="advance-form">

<div class="form-grid">

<input type="date" id="advanceDate" required>

<select id="advanceEmployee" required>
<option value="">Sélectionner un employé</option>
</select>

<input type="number" id="advanceAmount" placeholder="Montant" required>

<select id="advanceType" required>
<option value="">Type d'avance</option>
<option value="T.Salaire">T.Salaire</option>
<option value="Réparation véhicule">Réparation véhicule</option>
<option value="Prêt">Prêt</option>
<option value="Prime alimentation">Prime alimentation</option>
<option value="Prime mission">Prime mission</option>
</select>

<select id="salaryMonth" style="display:none;">
<option value="">Choisir le mois</option>
<option value="Janvier 2026">Janvier 2026</option>
<option value="Février 2026">Février 2026</option>
<option value="Mars 2026">Mars 2026</option>
<option value="Avril 2026">Avril 2026</option>
<option value="Mai 2026">Mai 2026</option>
<option value="Juin 2026">Juin 2026</option>
<option value="Juillet 2026">Juillet 2026</option>
<option value="Août 2026">Août 2026</option>
<option value="Septembre 2026">Septembre 2026</option>
<option value="Octobre 2026">Octobre 2026</option>
<option value="Novembre 2026">Novembre 2026</option>
<option value="Décembre 2026">Décembre 2026</option>
</select>

<input type="text" id="advanceDetails" placeholder="Détails">

</div>

<br>

<button type="submit" class="btn-success">
Ajouter l'avance
</button>

</form>
</div>

</div>
</div>

<div id="print-area"></div>

<script src="send.js"></script>

<script>

// (نفس كودك بدون تغيير)

document.getElementById("employee-form").addEventListener("submit", async function(e){
e.preventDefault();

await addEmployee(
document.getElementById("employeeNumber").value,
document.getElementById("employeeName").value,
document.getElementById("employeePosition").value
);

this.reset();
});

document.getElementById("advance-form").addEventListener("submit", async function(e){
e.preventDefault();

const type = document.getElementById("advanceType").value;
let details = document.getElementById("advanceDetails").value;

if(type === "T.Salaire"){
const salaryMonth = document.getElementById("salaryMonth");
details = salaryMonth.value;
}

await addTempAdvance(
document.getElementById("advanceDate").value,
document.getElementById("advanceEmployee").value,
document.getElementById("advanceAmount").value,
type,
details
);

this.reset();
document.getElementById("salaryMonth").style.display = "none";
});

document.addEventListener("DOMContentLoaded", () => {
loadAll();

document.getElementById("advanceDate").value =
new Date().toISOString().split("T")[0];

document.getElementById("advanceType")
.addEventListener("change", function(){
document.getElementById("salaryMonth").style.display =
(this.value === "T.Salaire") ? "block" : "none";
});
});

</script>

</body>
</html>
